services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

  api:
    environment:
      WEBWOVEN_ENV: production
      WEBWOVEN_ORIGIN: ${WEBWOVEN_ORIGIN:?Set the public HTTPS browser origin in .env}
      WEBWOVEN_API_ORIGIN: ${WEBWOVEN_API_ORIGIN:?Set the public HTTPS API origin in .env}
      WEBWOVEN_DATABASE_URL: postgresql+asyncpg://webwoven:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/webwoven
      WEBWOVEN_SESSION_SECRET: ${WEBWOVEN_SESSION_SECRET:?Set WEBWOVEN_SESSION_SECRET in .env}
      WEBWOVEN_EDGE_SECRET: ${WEBWOVEN_EDGE_SECRET:?Set WEBWOVEN_EDGE_SECRET in .env}
      WEBWOVEN_COOKIE_SECURE: "true"
    volumes: !override
      - ${WEBWOVEN_GRAPH_DIR:?Set WEBWOVEN_GRAPH_DIR in .env}:/app/data:ro

  analytics-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DATABASE_PASSWORD:?Set UMAMI_DATABASE_PASSWORD in .env}
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  analytics:
    image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
    init: true
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DATABASE_PASSWORD:?Set UMAMI_DATABASE_PASSWORD in .env}@analytics-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?Set UMAMI_APP_SECRET in .env}
      CLIENT_IP_HEADER: X-Forwarded-For
      DISABLE_TELEMETRY: "1"
      DISABLE_UPDATES: "1"
      PRIVATE_MODE: "1"
    ports:
      - "127.0.0.1:${WEBWOVEN_ANALYTICS_PORT:-3000}:3000"
    depends_on:
      analytics-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  caddy:
    environment:
      WEBWOVEN_SITE_ADDRESS: ${WEBWOVEN_SITE_ADDRESS:?Set the public HTTPS site address in .env}
      WEBWOVEN_REDIRECT_ADDRESS: ${WEBWOVEN_REDIRECT_ADDRESS:?Set the public HTTPS redirect address in .env}
      WEBWOVEN_ANALYTICS_ADDRESS: ${WEBWOVEN_ANALYTICS_ADDRESS:?Set the analytics HTTPS address in .env}
    depends_on:
      analytics:
        condition: service_healthy
    ports: !override
      - "${WEBWOVEN_HTTP_PORT:-80}:80"
      - "${WEBWOVEN_HTTPS_PORT:-443}:443"

volumes:
  analytics_postgres_data:
