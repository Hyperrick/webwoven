name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --all-packages --group dev --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: uv run python scripts/export_openapi.py --check

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm api:types
      - run: git diff --exit-code -- apps/web/src/lib/api/generated/schema.ts
      - run: pnpm lint
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  browser:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  docs-and-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --all-packages --group dev --locked
      - run: uv run mkdocs build --strict
      - run: uv run --package webwoven-pipeline webwoven-pipeline build-smoke
      - run: uv run pytest tests/data-quality services/pipeline/tests

  containers:
    runs-on: ubuntu-latest
    needs: [python, web, browser, docs-and-data]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose config --quiet
      - name: Validate production Compose override
        env:
          POSTGRES_PASSWORD: production-database-password-123456
          WEBWOVEN_SITE_ADDRESS: https://webwoven.example.com
          WEBWOVEN_ORIGIN: https://webwoven.example.com
          WEBWOVEN_API_ORIGIN: https://webwoven.example.com
          WEBWOVEN_SESSION_SECRET: ci-only-not-a-secret-session-0123456789abcdef
          WEBWOVEN_EDGE_SECRET: ci-only-not-a-secret-edge-fedcba9876543210
          WEBWOVEN_GRAPH_DIR: ${{ github.workspace }}/data/fixtures/smoke
        run: docker compose -f docker-compose.yml -f docker-compose.production.yml config --quiet
      - run: docker compose build api caddy
