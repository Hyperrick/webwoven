#cloud-config
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - docker.io
  - docker-compose-v2
  - fail2ban
  - ufw

users:
  - default
  - name: webwoven
    groups: [docker]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:/usr/bin/docker,/usr/bin/systemctl"

runcmd:
  - systemctl enable --now docker
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - install -d -o webwoven -g webwoven /opt/webwoven
